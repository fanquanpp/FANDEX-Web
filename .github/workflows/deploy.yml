name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: QA Check
        run: npm run qa
      - name: Preserve CNAME if exists
        run: |
          if [ -f public/CNAME ]; then
            cp public/CNAME dist/CNAME
            echo "CNAME file preserved in dist/"
          else
            echo "No CNAME file found, skipping"
          fi
      - name: Verify Pagefind index
        run: |
          if [ -d "dist/pagefind" ]; then
            echo "Pagefind index found"
            ls -la dist/pagefind/ | head -5
          else
            echo "::warning::Pagefind index not found - search will not work"
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
